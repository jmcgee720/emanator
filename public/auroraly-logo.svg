<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200" role="img" aria-label="Auroraly">
  <defs>
    <!-- Crescent gradient: cyan → teal → purple → magenta -->
    <linearGradient id="auroraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7AE7FF"/>
      <stop offset="35%" stop-color="#00D4FF"/>
      <stop offset="55%" stop-color="#5C5CFF"/>
      <stop offset="80%" stop-color="#B249FF"/>
      <stop offset="100%" stop-color="#FF4DD8"/>
    </linearGradient>
    <!-- Sparkle gradient (warmer, golden-cyan) -->
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE9B0"/>
      <stop offset="50%" stop-color="#9DEEFF"/>
      <stop offset="100%" stop-color="#7C9CFF"/>
    </linearGradient>
    <!-- Soft glow filter -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- LOGO MARK: stylized crescent forming an "A" -->
  <g filter="url(#softGlow)">
    <!-- Outer crescent -->
    <path
      d="M 100 30
         C 145 30, 175 65, 175 110
         C 175 150, 148 178, 110 180
         C 132 168, 148 142, 148 112
         C 148 80, 130 56, 102 50
         C 88 47, 78 47, 70 50
         C 75 42, 88 32, 100 30 Z"
      fill="url(#auroraGrad)"/>
    <!-- Soft inner highlight -->
    <ellipse cx="140" cy="100" rx="14" ry="38" fill="#FFFFFF" opacity="0.12"/>
  </g>

  <!-- 4-POINT SPARKLE (upper right of crescent) -->
  <g transform="translate(165 50)" filter="url(#softGlow)">
    <path
      d="M 0 -16 L 3 -3 L 16 0 L 3 3 L 0 16 L -3 3 L -16 0 L -3 -3 Z"
      fill="url(#sparkGrad)"/>
    <circle cx="0" cy="0" r="3.5" fill="#FFFFFF" opacity="0.9"/>
  </g>

  <!-- WORDMARK: AURORALY -->
  <g transform="translate(220 142)">
    <text
      x="0" y="0"
      fill="#FFFFFF"
      font-family="'Inter', 'SF Pro Display', system-ui, -apple-system, 'Helvetica Neue', sans-serif"
      font-weight="600"
      font-size="92"
      letter-spacing="6">AURORALY</text>
  </g>
</svg>
