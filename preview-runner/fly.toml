# Auroraly Preview Runner — Fly Machines config
#
# This is the IMAGE we deploy to Fly. Each PREVIEW spawns a fresh machine
# from this image (via the orchestrator's POST /v1/apps/.../machines call).
# We set auto_stop_machines so idle previews die after ~10 min.
#
# Two services exposed externally:
#   :3000 → user's dev server (Vite/Next/whatever) — public
#   :8080 → the runner control plane                — locked down by shared secret
#
# Concurrency hard_limit=1 because each machine hosts ONE project at a time.

app = "auroraly-preview-runner"
primary_region = "iad"   # Ashburn, low-latency to Vercel's us-east-1

[build]
  dockerfile = "Dockerfile"

[env]
  RUNNER_PORT = "8080"
  # USER_DEV_PORT intentionally unset — the runner defaults it to 3001
  # so the user's dev server binds there and the project-routing proxy
  # (which fly-replays mis-targeted iframe traffic) can own port 3000.
  # Hard-pinning USER_DEV_PORT=3000 here used to make both the proxy
  # and the dev server fight for the same socket on boot.
  # NODE_ENV deliberately NOT set here. Per-spawn overrides in
  # preview-runner/index.js are authoritative: NODE_ENV=development
  # for both npm install (so devDependencies install) AND the dev
  # server spawn (so Next.js wires its dev-mode CSS pipeline with
  # PostCSS / Tailwind). Setting it here as "production" silently
  # broke user previews — Next.js's App Router CSS handler skipped
  # PostCSS and webpack choked on @tailwind directives.

# User dev server — what the iframe actually loads.
[[services]]
  internal_port = 3000
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 100

  # No tcp_check on :3000 — the user's dev server only binds this port
  # AFTER the orchestrator hits POST /start. A baseline machine is in
  # "no project loaded" state and would always look unhealthy here.

# Runner control plane — orchestrator-only, on a separate port.
[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    port = 8443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 10

[[vm]]
  size = "shared-cpu-4x"
  memory = "8gb"
  # 8GB for cold-start npm installs — projects with normal dependency
  # counts (React + Router + Firebase + Vite = ~500 packages) can spike
  # to 4-5GB during peer-dep resolution. 4GB was OOM-killing installs
  # before they completed, causing infinite restart loops. 8GB provides
  # genuine headroom for the install peak + running dev server + HMR.
  # Auto-shutdown when idle. Cuts cost ~80% for the typical dev session.
  # Active cost: ~$10/mo per always-on app; ~$2-3/mo per idle-most-of-the-day
  # project after autostop kicks in.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
