# Auto-deploy the preview-runner Docker image to Fly Machines whenever
# any file under preview-runner/ changes on main.
#
# Why this exists: the preview-runner is a separate Docker image deployed
# to Fly that runs each user project's dev server. It is NOT auto-
# deployed by Vercel (which only handles the Auroraly main app). Before
# this workflow, any preview-runner fix required a manual `flyctl deploy`
# from a maintainer's local machine — easy to forget, and means
# preview-runner code drift can hide for weeks. With this workflow,
# every commit to preview-runner/** triggers a clean build + rolling
# deploy of all preview machines.
#
# Setup required (one-time):
#   1. Create a Fly API token:
#        flyctl tokens create deploy -x 8760h --name "preview-runner-gha"
#      (returns a token starting with `FlyV1 fm2_…`)
#   2. Add it to GitHub repo secrets:
#        Settings → Secrets and variables → Actions → New repository secret
#        Name:  FLY_API_TOKEN
#        Value: (paste the token from step 1)
#   3. Commit/merge any change under preview-runner/** to main; the
#      workflow takes over from there.
#
# Manual run: Actions tab → "Preview Runner Deploy" → Run workflow.

name: Preview Runner Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'preview-runner/**'
      - '.github/workflows/preview-runner-deploy.yml'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you manually re-deploying? (audit trail)'
        required: false
        default: 'Manual redeploy'

# Concurrency: cancel any in-flight deploy when a newer commit lands.
# Preview machines should always run the latest preview-runner code; an
# older in-progress deploy would otherwise race and possibly land last.
concurrency:
  group: preview-runner-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: flyctl deploy preview-runner
    runs-on: ubuntu-latest
    permissions:
      # We only need to read the repo; no write/issue/PR permissions.
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly
        # Working directory matters: flyctl reads ./fly.toml from the
        # current directory to pick the app + build config. Running
        # from preview-runner/ avoids needing --config flags.
        working-directory: preview-runner
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::error::FLY_API_TOKEN secret is not set on this repo."
            echo "::error::Run 'flyctl tokens create deploy -x 8760h --name preview-runner-gha' and add the result as a GitHub Actions secret named FLY_API_TOKEN."
            exit 1
          fi
          echo "Triggered by: ${{ github.event_name }} (${{ github.event.inputs.reason || github.event.head_commit.message }})"
          # --remote-only avoids needing a Docker daemon on the runner;
          # Fly's builder service builds the image server-side. --strategy
          # rolling does machine-by-machine update so we never have zero
          # healthy preview machines mid-deploy.
          flyctl deploy --remote-only --strategy rolling --verbose

      - name: Surface deploy result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ preview-runner deployed. Existing Fly machines will rolling-restart with the new image; new previews boot from it immediately."
          else
            echo "::error::Deploy failed — see the flyctl step above. Existing preview machines continue serving the previous image, so user previews are not down."
          fi
